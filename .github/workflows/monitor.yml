name: 网站监控 - 海州区公告页面

on:
  schedule:
    # 每30分钟检查一次 (UTC时间)
    - cron: '*/30 * * * *'
  # 也允许手动触发
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 使用 GitHub Actions 内置 token，允许推送
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行监控
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
        run: python3 monitor_action.py

      - name: 提交快照更新
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshot.json content_hash.txt monitor.log
          if git diff --staged --quiet; then
            echo "没有快照变化需要提交"
          else
            git commit -m "📸 更新监控快照 [skip ci]"
            git push
          fi
